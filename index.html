    <!-- Early script error suppressor -->
    <script>
      (function() {
        var handler = function(msg) {
          if (msg === 'Script error.' || (typeof msg === 'string' && msg.indexOf('Script error') !== -1)) {
            return true;
          }
          return false;
        };
        window.onerror = function(message) { if (handler(message)) return true; };
        window.addEventListener('error', function(e) {
          if (handler(e.message)) { e.preventDefault(); e.stopPropagation(); }
        }, true);
        window.addEventListener('unhandledrejection', function(e) {
          if (e.reason && handler(e.reason.message)) { e.preventDefault(); }
        });
      })();
